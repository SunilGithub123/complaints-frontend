# ─────────────────────────────────────────────────────────────────────────────
# CI — typecheck + lint + unit tests + build + bundle-size budget + OpenAPI
# drift check against the sibling backend repo.
#
# Design contract: docs/CI_CD_DESIGN.md §3.1.
# Required for merge into `main`. Average duration: ~2 min cached.
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Default to read-only; jobs escalate per-step if they need more.
permissions:
  contents: read
  checks: write       # dorny/test-reporter needs this to publish the run
  pull-requests: write # …and to annotate the PR with the summary

# GitHub-hosted runners now ship Node 24 and reject actions whose
# `action.yml` still declares `runs.using: node20` unless this flag
# is set. All actions we pin are at their current latest major
# (checkout@v4, setup-node@v4, pnpm/action-setup@v4, upload-artifact@v4,
# dorny/test-reporter@v2) — none has a newer release yet, so we opt
# in to the legacy runtime until upstream bumps.
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  build-test:
    name: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm must come before setup-node so setup-node's `cache: pnpm`
      # can find the binary on PATH.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version is taken from the root `packageManager` field — no
        # need to repeat it here.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 1. Static contract — runs first because it's the cheapest signal.
      - name: Typecheck
        run: pnpm -w typecheck

      # 2. Style + hard-rule enforcement (banned imports, etc. — see
      #    apps/web/eslint.config.js).
      - name: Lint
        run: pnpm -w lint

      # 3. Unit tests. We invoke vitest directly per workspace (not via
      #    turbo) because turbo's task-arg forwarding strips extra
      #    reporter flags — same JUnit XMLs need to land at known paths
      #    for the dorny/test-reporter step below. Both vitest runs are
      #    fast and cache-irrelevant; total ≈ 5 s.
      - name: Unit tests — apps/web
        run: |
          pnpm --filter web exec vitest run \
            --reporter=default \
            --reporter=junit \
            --outputFile.junit=./junit.xml

      - name: Unit tests — @complaints/api
        run: |
          pnpm --filter @complaints/api exec vitest run \
            --reporter=default \
            --reporter=junit \
            --outputFile.junit=./junit.xml

      # 4. Production build. Also produces the artefacts size-limit
      #    measures in step 5.
      - name: Build
        run: pnpm -w build

      # 5. Bundle-size budget (the 180 KB gzipped entry-chunk number is
      #    a hard gate per docs/CI_CD_DESIGN.md §3.2 / IMPLEMENTATION_LOG.md).
      - name: Bundle size (size-limit)
        run: pnpm --filter web size

      # 6. PR-friendly test annotations. `always()` so we still surface
      #    failed tests when an earlier step (e.g. size) errored — but
      #    skip the publish entirely when no junit.xml exists yet (an
      #    upstream typecheck/lint/build failure cut the run short
      #    before vitest could write one). `fail-on-empty: false` is
      #    belt-and-braces for the same case.
      - name: Publish test report
        if: always() && hashFiles('apps/web/junit.xml', 'packages/api/junit.xml') != ''
        uses: dorny/test-reporter@v3
        with:
          name: Vitest
          path: |
            apps/web/junit.xml
            packages/api/junit.xml
          reporter: jest-junit
          fail-on-error: false
          fail-on-empty: false

      # 7. Keep the dist/ artefact around for the image / lighthouse
      #    workflows that don't need to rebuild. 7-day retention is
      #    plenty for PR review windows.
      - name: Upload web dist
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: apps/web/dist
          retention-days: 7
          if-no-files-found: error

  api-codegen-fresh:
    name: api-codegen-fresh
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Self-contained internal-consistency check (replaces the previous
    # cross-repo `openapi-drift` job).
    #
    # What this catches:
    #   The committed `packages/api/openapi.json` does NOT match the
    #   committed `packages/api/src/generated/**` — i.e. someone edited
    #   the OpenAPI snapshot but forgot to run `pnpm api:gen` (or vice
    #   versa, regen output was hand-edited).
    #
    # What this deliberately does NOT do:
    #   Compare against the sibling backend repo's `main`. Syncing the
    #   BE OpenAPI snapshot into the FE is a deliberate human step
    #   performed as part of a feature PR — not something CI should
    #   police on every BE merge. Integration drift between FE and a
    #   running BE is caught by E2E tests in PR #3, which is the right
    #   layer for that check.
    #
    # See docs/CI_CD_DESIGN.md §3.1 + Decision log entry 2026-06-22.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate API bindings from committed openapi.json
        run: pnpm api:gen

      # `git status --porcelain` catches both modified tracked files
      # AND newly generated untracked files. We scope to
      # `packages/api/src` so the check is about generated *output*
      # only — `openapi.json` itself is the input and is not rewritten
      # by `pnpm api:gen`.
      - name: Assert openapi.json and generated bindings are in lockstep
        run: |
          STATUS="$(git status --porcelain -- packages/api/src)"
          if [ -n "$STATUS" ]; then
            echo "::error::packages/api/openapi.json and packages/api/src/generated are out of sync."
            echo "::error::Run \`pnpm api:gen\` locally and commit the result."
            echo "Details:"
            echo "$STATUS"
            exit 1
          fi




